services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocean-helper-bot-app
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: ocean-helper-bot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - app-network

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
